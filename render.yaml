services:
  - type: web
    name: tezchipta
    env: node
    region: oregon
    plan: standard
    
    # Build configuration - Build happens first
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production tsx server.ts
    
    # Environment variables are managed via Render dashboard
    # Make sure these are set:
    # - NODE_ENV: production (automatically set by Render)
    # - JWT_SECRET: (your secret)
    # - FIREBASE_PROJECT_ID: tezchipta
    # - FIREBASE_API_KEY: (from firebase-applet-config.json)
    # - STRIPE_SECRET_KEY: (your stripe key)
    # - CORS_ORIGINS: https://tezchipta.onrender.com
    # - APP_URL: https://tezchipta.onrender.com
    # - PORT: (automatically set by Render, default 3000)
    # - Other required environment variables from .env
    
    # Auto-deploy on push to main branch
    autoDeploy: true
    
    # Health check
    healthCheckPath: /api/health
    healthCheckTimeout: 30
    
    # Max instance size
    maxInstanceSize: medium
